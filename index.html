<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Personaje AR</title>
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        model-viewer { width: 100%; height: 100%; }
        #ar-button {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            background-color: #007bff; color: white; border: none; border-radius: 30px;
            padding: 14px 28px; font-family: sans-serif; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://github.com/abarrios-crypto/mi-realidad-aumentada/raw/refs/heads/main/voxel%20character%203d%20model.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        alt="Modelo Voxel 3D en Realidad Aumentada">
        
        <button slot="ar-button" id="ar-button">
            ✨ VER EN TU ESPACIO (AR)
        </button>
    </model-viewer>

</body>
</html>
